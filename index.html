<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 당신을 위한 성경말씀</title>
  <style>
    :root {
      --bg-1: #f8f4ea;
      --bg-2: #e9f1ef;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #4b5563;
      --primary: #1d4ed8;
      --primary-soft: #dbeafe;
      --border: #d1d5db;
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, var(--bg-2) 0%, var(--bg-1) 52%, #fdfdfd 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(820px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 28px 24px 18px;
      background: linear-gradient(120deg, #fef3c7 0%, #e0f2fe 100%);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--sub);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .hero-image {
      margin-top: 14px;
      height: 140px;
      border-radius: 14px;
      border: 1px solid #bfdbfe;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.75)),
        url("https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .label {
      font-weight: 700;
      margin: 0 0 8px;
      font-size: 0.98rem;
    }

    .mood-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    }

    .mood-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .mood-btn:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    .mood-btn.active {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: #1e3a8a;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .ghost-btn {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.16s ease;
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
    }

    .ghost-btn {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--border);
    }

    .primary-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .result {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      background: #fcfcfd;
      display: grid;
      gap: 12px;
      min-height: 200px;
      align-content: start;
    }

    .result.loading {
      place-items: center;
      align-content: center;
      background: #f8fafc;
    }

    .empty {
      color: var(--sub);
      margin: 0;
      line-height: 1.6;
    }

    .chip {
      display: inline-block;
      width: fit-content;
      font-size: 0.84rem;
      color: #334155;
      background: #e2e8f0;
      border-radius: 999px;
      padding: 5px 10px;
    }

    .verse-visual {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }

    blockquote {
      margin: 0;
      padding: 14px;
      border-left: 4px solid #93c5fd;
      background: #eff6ff;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 1rem;
    }

    .ref {
      font-size: 0.9rem;
      color: #1e3a8a;
      font-weight: 700;
    }

    .desc {
      margin: 0;
      color: var(--sub);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .loading-wrap {
      display: grid;
      gap: 10px;
      justify-items: center;
      color: #334155;
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid #bfdbfe;
      border-top-color: #1d4ed8;
      animation: spin 0.9s linear infinite;
    }

    .loading-text {
      margin: 0;
      font-size: 0.92rem;
      color: #334155;
    }

    .fade-in {
      animation: fadeIn 0.45s ease both;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      padding: 0 22px 20px;
      color: #6b7280;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .content {
        padding: 18px;
      }

      .header {
        padding: 22px 18px 14px;
      }

      .footer {
        padding: 0 18px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>오늘 당신을 위한 성경말씀</h1>
      <p class="subtitle">지금 감정에 맞는 개역개정 성경구절과 짧은 묵상 포인트를 추천해드립니다.</p>
      <div class="hero-image" aria-label="성경 관련 이미지"></div>
    </header>

    <section class="content">
      <div>
        <p class="label">오늘 내 마음은 어떤가요?</p>
        <div class="mood-grid" id="moodGrid"></div>
      </div>

      <div class="actions">
        <button class="primary-btn" id="recommendBtn" disabled>말씀 추천받기</button>
        <button class="ghost-btn" id="anotherBtn" disabled>다른 구절 보기</button>
      </div>

      <section class="result" id="resultBox">
        <p class="empty">감정을 먼저 선택하신 뒤 <strong>말씀 추천받기</strong> 버튼을 눌러주세요.</p>
      </section>
    </section>

    <footer class="footer">
      본 앱은 개역개정 성경 본문 일부를 인용하여 개인 묵상용으로 제공합니다.
    </footer>
  </main>

      "불안": "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=1200&q=80",
      "두려움": "https://images.unsplash.com/photo-1433863448220-78aaa064ff47?auto=format&fit=crop&w=1200&q=80",
      "지침": "https://images.unsplash.com/photo-1472396961693-142e6e269027?auto=format&fit=crop&w=1200&q=80",
      "감사": "https://images.unsplash.com/photo-1470246973918-29a93221c455?auto=format&fit=crop&w=1200&q=80",
      "분노": "https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=1200&q=80"
    };
    let selectedMood = "";
    let lastIndex = -1;
    let loadingTimer = null;

    function renderMoodButtons() {
      moods.forEach((mood) => {
        const button = document.createElement("button");
        button.className = "mood-btn";
        button.textContent = mood;
        button.type = "button";

        button.addEventListener("click", () => {
          if (loadingTimer) {
            clearTimeout(loadingTimer);
            loadingTimer = null;
          }
          selectedMood = mood;
          lastIndex = -1;
          document.querySelectorAll(".mood-btn").forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
          recommendBtn.disabled = false;
          anotherBtn.disabled = true;
          resultBox.innerHTML = "<p class='empty'>선택한 감정에 맞춰 말씀을 추천할 준비가 되었어요. <strong>말씀 추천받기</strong>를 눌러주세요.</p>";
          resultBox.classList.remove("loading");
        });

        moodGrid.appendChild(button);
      });
    }

    function pickVerse(mood) {
      const verses = verseByMood[mood];
      if (!verses || verses.length === 0) {
        return null;
      }

      let idx = Math.floor(Math.random() * verses.length);
      if (verses.length > 1) {
        while (idx === lastIndex) {
          idx = Math.floor(Math.random() * verses.length);
        }
      }
      lastIndex = idx;
      return verses[idx];
    }

    function renderVerse() {
      if (!selectedMood) {
        return;
      }

      const picked = pickVerse(selectedMood);
      if (!picked) {
        resultBox.innerHTML = "<p class='empty'>해당 감정에 대한 말씀이 아직 준비되지 않았습니다.</p>";
        return;
      }

      if (loadingTimer) {
        clearTimeout(loadingTimer);
      }

      recommendBtn.disabled = true;
      anotherBtn.disabled = true;
      resultBox.classList.add("loading");
      resultBox.innerHTML = `
        <div class="loading-wrap">
          <div class="spinner" aria-hidden="true"></div>
          <p class="loading-text">말씀을 찾고 있습니다...</p>
        </div>
      `;

      const delay = 1200 + Math.floor(Math.random() * 900);
      loadingTimer = setTimeout(() => {
        const moodImage = moodImageByKey[selectedMood] || moodImageByKey["감사"];
        resultBox.classList.remove("loading");
        resultBox.innerHTML = `
          <img class="verse-visual fade-in" src="${moodImage}" alt="감정 ${selectedMood}에 어울리는 성경 묵상 이미지" loading="lazy" />
          <span class="chip fade-in">감정: ${selectedMood}</span>
          <blockquote class="fade-in">${picked.verse}</blockquote>
          <div class="ref fade-in">${picked.reference} (개역개정)</div>
          <p class="desc fade-in">${picked.description}</p>
        `;
        recommendBtn.disabled = false;
        anotherBtn.disabled = false;
        loadingTimer = null;
      }, delay);
    }

    recommendBtn.addEventListener("click", renderVerse);
    anotherBtn.addEventListener("click", renderVerse);

    renderMoodButtons();
  </script>
</body>
</html>
