<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 당신을 위한 성경말씀</title>
  <style>
    :root {
      --bg-1: #f8f4ea;
      --bg-2: #e9f1ef;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #4b5563;
      --primary: #1d4ed8;
      --primary-soft: #dbeafe;
      --border: #d1d5db;
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, var(--bg-2) 0%, var(--bg-1) 52%, #fdfdfd 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px 24px 18px;
      background: linear-gradient(120deg, #fef3c7 0%, #e0f2fe 100%);
      border-bottom: 1px solid var(--border);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--sub);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .lang-switch {
      display: inline-flex;
      border: 1px solid #93c5fd;
      border-radius: 999px;
      overflow: hidden;
      background: #ffffffd8;
    }

    .lang-btn {
      border: none;
      background: transparent;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #1e3a8a;
    }

    .lang-btn.active {
      background: #1d4ed8;
      color: #fff;
      font-weight: 700;
    }

    .hero-image {
      margin-top: 14px;
      height: 140px;
      border-radius: 14px;
      border: 1px solid #bfdbfe;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.75)),
        url("https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .section-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .section-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .section-btn.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1e3a8a;
      font-weight: 700;
    }

    .label {
      font-weight: 700;
      margin: 0 0 8px;
      font-size: 0.98rem;
    }

    .option-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }

    .option-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .option-btn:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    .option-btn.active {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: #1e3a8a;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .ghost-btn {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.16s ease;
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
    }

    .ghost-btn {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--border);
    }

    .primary-btn:disabled,
    .ghost-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .result {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      background: #fcfcfd;
      display: grid;
      gap: 12px;
      min-height: 220px;
      align-content: start;
    }

    .result.loading {
      place-items: center;
      align-content: center;
      background: #f8fafc;
    }

    .empty {
      color: var(--sub);
      margin: 0;
      line-height: 1.6;
    }

    .chip {
      display: inline-block;
      width: fit-content;
      font-size: 0.84rem;
      color: #334155;
      background: #e2e8f0;
      border-radius: 999px;
      padding: 5px 10px;
    }

    .verse-visual {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }

    blockquote {
      margin: 0;
      padding: 14px;
      border-left: 4px solid #93c5fd;
      background: #eff6ff;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 1rem;
    }

    .ref {
      font-size: 0.9rem;
      color: #1e3a8a;
      font-weight: 700;
    }

    .desc {
      margin: 0;
      color: var(--sub);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .loading-wrap {
      display: grid;
      gap: 10px;
      justify-items: center;
      color: #334155;
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid #bfdbfe;
      border-top-color: #1d4ed8;
      animation: spin 0.9s linear infinite;
    }

    .loading-text {
      margin: 0;
      font-size: 0.92rem;
      color: #334155;
    }

    .fade-in {
      animation: fadeIn 0.45s ease both;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      padding: 0 22px 20px;
      color: #6b7280;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .content {
        padding: 18px;
      }

      .header {
        padding: 20px 18px 14px;
      }

      .footer {
        padding: 0 18px 18px;
      }

      .hero-image {
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="top-row">
        <div>
          <h1 id="titleText">오늘 당신을 위한 성경말씀</h1>

        <div class="lang-switch" aria-label="Language switch">

        </div>
      </div>
      <div class="hero-image" aria-label="성경 관련 이미지"></div>
    </header>

    <section class="content">
      <div class="section-switch" id="sectionSwitch"></div>

      <div>
        <p class="label" id="selectLabel">오늘 내 마음은 어떤가요?</p>
        <div class="option-grid" id="optionGrid"></div>
      </div>

      <div class="actions">
        <button class="primary-btn" id="recommendBtn" disabled>말씀 추천받기</button>
        <button class="ghost-btn" id="anotherBtn" disabled>다른 구절 보기</button>
      </div>

      <section class="result" id="resultBox">

      </section>
    </section>

    <footer class="footer" id="footerText">

  </main>

        { reference: "잠언 16:9", verseKo: "사람이 마음으로 자기의 길을 계획할지라도 그의 걸음을 인도하시는 이는 여호와시니라.", descKo: "계획과 인도 사이의 균형을 잡아 줍니다.", verseEn: "In their hearts humans plan their course, but the Lord establishes their steps.", descEn: "Plan faithfully, but trust God's leading." },
        { reference: "야고보서 4:15", verseKo: "주의 뜻이면 우리가 살기도 하고 이것이나 저것을 하리라 할 것이거늘.", descKo: "미래를 겸손히 하나님 뜻 아래 두게 합니다.", verseEn: "If it is the Lord's will, we will live and do this or that.", descEn: "Hold future plans under God's will." },
        { reference: "시편 37:23-24", verseKo: "여호와께서 사람의 걸음을 정하시고... 넘어지나 아주 엎드러지지 아니함은 여호와께서 그의 손으로 붙드심이로다.", descKo: "실수와 흔들림 속에서도 붙드시는 손을 보게 합니다.", verseEn: "The Lord makes firm the steps... though he may stumble, he will not fall.", descEn: "Even stumbles are held by God." },
        { reference: "이사야 43:19", verseKo: "보라 내가 새 일을 행하리니.", descKo: "막막함 가운데 새 길을 여시는 하나님을 기대하게 합니다.", verseEn: "See, I am doing a new thing.", descEn: "God can open a new path in uncertain seasons." },
        { reference: "로마서 8:18", verseKo: "현재의 고난은 장차 우리에게 나타날 영광과 비교할 수 없도다.", descKo: "현재의 어려움을 미래의 소망으로 해석하게 합니다.", verseEn: "Our present sufferings are not worth comparing with the glory that will be revealed.", descEn: "Present pain is not your final future." },
        { reference: "히브리서 11:8", verseKo: "아브라함은 부르심을 받았을 때에 순종하여... 갈 바를 알지 못하고 나아갔으며.", descKo: "확실한 지도 없이도 순종으로 한 걸음 내딛게 합니다.", verseEn: "By faith Abraham obeyed... even though he did not know where he was going.", descEn: "Faith often moves before full clarity." }
      ]
    };

    const sectionFallbackPool = {
      mood: [
        { reference: "시편 46:1", verseKo: "하나님은 우리의 피난처시요 힘이시니.", descKo: "모든 감정에서 하나님이 피난처가 되십니다.", verseEn: "God is our refuge and strength.", descEn: "God is a refuge in every emotional season." },
        { reference: "이사야 41:10", verseKo: "두려워하지 말라 내가 너와 함께 함이라.", descKo: "불안과 두려움 가운데 동행을 확신하게 합니다.", verseEn: "Do not fear, for I am with you.", descEn: "God's presence calms fear." }
      ],
      situation: [
        { reference: "로마서 12:18", verseKo: "할 수 있거든 모든 사람과 더불어 화목하라.", descKo: "관계 상황에서 평화의 원칙을 세웁니다.", verseEn: "As far as it depends on you, live at peace with everyone.", descEn: "A practical principle for relationships." },
        { reference: "잠언 3:5-6", verseKo: "여호와를 신뢰하고 네 명철을 의지하지 말라.", descKo: "일상 문제를 신뢰로 풀어가게 합니다.", verseEn: "Trust in the Lord with all your heart.", descEn: "Trust guides daily decisions." }
      ]
    };

    function ensureMinimumVerses(library, minCount) {
      Object.keys(library).forEach((sectionKey) => {
        const options = library[sectionKey];
        options.forEach((option) => {
          const existingRefs = new Set(option.verses.map((verse) => verse.reference));
          const candidates = [
            ...(supplementalVersePoolByOption[option.id] || []),
            ...(sectionFallbackPool[sectionKey] || [])
          ];
          for (const candidate of candidates) {
            if (option.verses.length >= minCount) {
              break;
            }
            if (existingRefs.has(candidate.reference)) {
              continue;
            }
            option.verses.push({ ...candidate });
            existingRefs.add(candidate.reference);
          }
        });
      });
    }

    ensureMinimumVerses(verseLibrary, 10);

    const sectionSwitch = document.getElementById("sectionSwitch");
    const optionGrid = document.getElementById("optionGrid");
    const recommendBtn = document.getElementById("recommendBtn");
    const anotherBtn = document.getElementById("anotherBtn");
    const resultBox = document.getElementById("resultBox");

    const titleText = document.getElementById("titleText");
    const subtitleText = document.getElementById("subtitleText");
    const selectLabel = document.getElementById("selectLabel");
    const emptyText = document.getElementById("emptyText");
    const footerText = document.getElementById("footerText");
    const langKoBtn = document.getElementById("langKoBtn");
    const langEnBtn = document.getElementById("langEnBtn");

    let lang = "ko";
    let selectedSection = "mood";
    let selectedOptionId = "";
    let lastIndex = -1;
    let loadingTimer = null;
    let lastPicked = null;

    function t(key) {
      return uiText[lang][key];
    }

    const bookNameMapKoToEn = {
      "시편": "Psalms",
      "빌립보서": "Philippians",
      "데살로니가전서": "1 Thessalonians",
      "이사야": "Isaiah",
      "히브리서": "Hebrews",
      "마태복음": "Matthew",
      "잠언": "Proverbs",
      "예레미야": "Jeremiah",
      "에베소서": "Ephesians",
      "골로새서": "Colossians",
      "로마서": "Romans",
      "느헤미야": "Nehemiah",
      "요한복음": "John",
      "하박국": "Habakkuk",
      "베드로전서": "1 Peter",
      "요한계시록": "Revelation",
      "예레미야애가": "Lamentations",
      "고린도후서": "2 Corinthians",
      "신명기": "Deuteronomy",
      "여호수아": "Joshua",
      "스바냐": "Zephaniah",
      "마가복음": "Mark",
      "갈라디아서": "Galatians",
      "출애굽기": "Exodus",
      "역대상": "1 Chronicles",
      "요한삼서": "3 John",
      "민수기": "Numbers",
      "창세기": "Genesis",
      "전도서": "Ecclesiastes",
      "고린도전서": "1 Corinthians",
      "디모데전서": "1 Timothy",
      "누가복음": "Luke",
      "야고보서": "James"
    };

    function getReferenceByLanguage(reference) {
      if (lang === "ko") {
        return reference;
      }
      const match = reference.match(/^([^\d]+)\s*(.+)$/);
      if (!match) {
        return reference;
      }
      const koBook = match[1].trim();
      const chapterVerse = match[2].trim();
      const enBook = bookNameMapKoToEn[koBook];
      if (!enBook) {
        return reference;
      }
      return `${enBook} ${chapterVerse}`;
    }

    function currentOptions() {
      return verseLibrary[selectedSection];
    }

    function findSelectedOption() {
      return currentOptions().find((item) => item.id === selectedOptionId) || null;
    }

    function clearLoading() {
      if (loadingTimer) {
        clearTimeout(loadingTimer);
        loadingTimer = null;
      }
      resultBox.classList.remove("loading");
    }

    function renderHeaderTexts() {
      document.documentElement.lang = lang === "ko" ? "ko" : "en";
      document.title = t("pageTitle");
      titleText.textContent = t("pageTitle");
      subtitleText.textContent = t("subtitle");
      recommendBtn.textContent = t("recommend");
      anotherBtn.textContent = t("another");
      footerText.textContent = t("footer");
      selectLabel.textContent = selectedSection === "mood" ? t("labelMood") : t("labelSituation");

      langKoBtn.classList.toggle("active", lang === "ko");
      langEnBtn.classList.toggle("active", lang === "en");
    }

    function renderSectionSwitch() {
      sectionSwitch.innerHTML = "";

      const sections = [
        { id: "mood", label: t("sectionMood") },
        { id: "situation", label: t("sectionSituation") }
      ];

      sections.forEach((section) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "section-btn";
        btn.textContent = section.label;
        btn.classList.toggle("active", selectedSection === section.id);

        btn.addEventListener("click", () => {
          if (selectedSection === section.id) {
            return;
          }
          clearLoading();
          selectedSection = section.id;
          selectedOptionId = "";
          lastIndex = -1;
          lastPicked = null;
          recommendBtn.disabled = true;
          anotherBtn.disabled = true;
          renderSectionSwitch();
          renderHeaderTexts();
          renderOptionButtons();
          showEmpty();
        });

        sectionSwitch.appendChild(btn);
      });
    }

    function renderOptionButtons() {
      optionGrid.innerHTML = "";
      const options = currentOptions();

      options.forEach((option) => {
        const button = document.createElement("button");
        button.className = "option-btn";
        button.type = "button";
        button.textContent = lang === "ko" ? option.ko : option.en;
        button.classList.toggle("active", selectedOptionId === option.id);

        button.addEventListener("click", () => {
          clearLoading();
          selectedOptionId = option.id;
          lastIndex = -1;
          lastPicked = null;
          recommendBtn.disabled = false;
          anotherBtn.disabled = true;
          renderOptionButtons();
          showReady();
        });

        optionGrid.appendChild(button);
      });
    }

    function pickVerse(option) {
      if (!option || !option.verses || option.verses.length === 0) {
        return null;
      }
      let idx = Math.floor(Math.random() * option.verses.length);
      if (option.verses.length > 1) {
        while (idx === lastIndex) {
          idx = Math.floor(Math.random() * option.verses.length);
        }
      }
      lastIndex = idx;
      return option.verses[idx];
    }

    function showEmpty() {
      resultBox.innerHTML = `<p class="empty">${t("empty")}</p>`;
      resultBox.classList.remove("loading");
    }

    function showReady() {
      resultBox.innerHTML = `<p class="empty">${t("ready")}</p>`;
      resultBox.classList.remove("loading");
    }

    function renderResultCard(option, picked) {
      const optionName = lang === "ko" ? option.ko : option.en;
      const chipLabel = selectedSection === "mood" ? t("chipMood") : t("chipSituation");
      const verseText = lang === "ko" ? picked.verseKo : picked.verseEn;
      const descText = lang === "ko" ? picked.descKo : picked.descEn;
      const referenceText = getReferenceByLanguage(picked.reference);
      const altText = lang === "ko"
        ? `${optionName}에 어울리는 성경 묵상 이미지`
        : `Bible meditation image for ${optionName}`;

      resultBox.classList.remove("loading");
      resultBox.innerHTML = `
        <img class="verse-visual fade-in" src="${option.image}" alt="${altText}" loading="lazy" />
        <span class="chip fade-in">${chipLabel}: ${optionName}</span>
        <blockquote class="fade-in">${verseText}</blockquote>
        <div class="ref fade-in">${referenceText} (${t("version")})</div>
        <p class="desc fade-in">${descText}</p>
      `;
    }

    function renderVerse() {
      const option = findSelectedOption();
      if (!option) {
        return;
      }

      const picked = pickVerse(option);
      if (!picked) {
        resultBox.innerHTML = `<p class="empty">${t("notReady")}</p>`;
        return;
      }

      clearLoading();
      recommendBtn.disabled = true;
      anotherBtn.disabled = true;
      resultBox.classList.add("loading");
      resultBox.innerHTML = `
        <div class="loading-wrap">
          <div class="spinner" aria-hidden="true"></div>
          <p class="loading-text">${t("loading")}</p>
        </div>
      `;

      const delay = 1200 + Math.floor(Math.random() * 900);
      loadingTimer = setTimeout(() => {
        lastPicked = { optionId: option.id, verse: picked };
        renderResultCard(option, picked);

        recommendBtn.disabled = false;
        anotherBtn.disabled = false;
        loadingTimer = null;
      }, delay);
    }

    langKoBtn.addEventListener("click", () => {
      if (lang === "ko") {
        return;
      }
      lang = "ko";
      renderHeaderTexts();
      renderSectionSwitch();
      renderOptionButtons();
      const option = findSelectedOption();
      if (option && lastPicked && lastPicked.optionId === option.id) {
        renderResultCard(option, lastPicked.verse);
      } else if (!selectedOptionId) {
        showEmpty();
      } else {
        showReady();
      }
    });

    langEnBtn.addEventListener("click", () => {
      if (lang === "en") {
        return;
      }
      lang = "en";
      renderHeaderTexts();
      renderSectionSwitch();
      renderOptionButtons();
      const option = findSelectedOption();
      if (option && lastPicked && lastPicked.optionId === option.id) {
        renderResultCard(option, lastPicked.verse);
      } else if (!selectedOptionId) {
        showEmpty();
      } else {
        showReady();
      }
    });

    recommendBtn.addEventListener("click", renderVerse);
    anotherBtn.addEventListener("click", renderVerse);

    renderHeaderTexts();
    renderSectionSwitch();
    renderOptionButtons();
    showEmpty();
  </script>
</body>
</html>
