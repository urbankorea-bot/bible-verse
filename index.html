<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 당신을 위한 성경말씀</title>
  <style>
    :root {
      --bg-1: #f8f4ea;
      --bg-2: #e9f1ef;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #4b5563;
      --primary: #1d4ed8;
      --primary-soft: #dbeafe;
      --border: #d1d5db;
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, var(--bg-2) 0%, var(--bg-1) 52%, #fdfdfd 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px 24px 18px;
      background: linear-gradient(120deg, #fef3c7 0%, #e0f2fe 100%);
      border-bottom: 1px solid var(--border);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--sub);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .lang-switch {
      display: inline-flex;
      border: 1px solid #93c5fd;
      border-radius: 999px;
      overflow: hidden;
      background: #ffffffd8;
    }

    .lang-btn {
      border: none;
      background: transparent;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #1e3a8a;
    }

    .lang-btn.active {
      background: #1d4ed8;
      color: #fff;
      font-weight: 700;
    }

    .hero-image {
      margin-top: 14px;
      height: 140px;
      border-radius: 14px;
      border: 1px solid #bfdbfe;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.75)),
        url("https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .section-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .section-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .section-btn.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1e3a8a;
      font-weight: 700;
    }

    .label {
      font-weight: 700;
      margin: 0 0 8px;
      font-size: 0.98rem;
    }

    .option-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }

    .option-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .option-btn:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    .option-btn.active {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: #1e3a8a;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .ghost-btn {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.16s ease;
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
    }

    .ghost-btn {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--border);
    }

    .primary-btn:disabled,
    .ghost-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .result {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      background: #fcfcfd;
      display: grid;
      gap: 12px;
      min-height: 220px;
      align-content: start;
    }

    .result.loading {
      place-items: center;
      align-content: center;
      background: #f8fafc;
    }

    .empty {
      color: var(--sub);
      margin: 0;
      line-height: 1.6;
    }

    .chip {
      display: inline-block;
      width: fit-content;
      font-size: 0.84rem;
      color: #334155;
      background: #e2e8f0;
      border-radius: 999px;
      padding: 5px 10px;
    }

    .verse-visual {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }

    blockquote {
      margin: 0;
      padding: 14px;
      border-left: 4px solid #93c5fd;
      background: #eff6ff;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 1rem;
    }

    .ref {
      font-size: 0.9rem;
      color: #1e3a8a;
      font-weight: 700;
    }

    .desc {
      margin: 0;
      color: var(--sub);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .loading-wrap {
      display: grid;
      gap: 10px;
      justify-items: center;
      color: #334155;
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid #bfdbfe;
      border-top-color: #1d4ed8;
      animation: spin 0.9s linear infinite;
    }

    .loading-text {
      margin: 0;
      font-size: 0.92rem;
      color: #334155;
    }

    .fade-in {
      animation: fadeIn 0.45s ease both;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      padding: 0 22px 20px;
      color: #6b7280;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .content {
        padding: 18px;
      }

      .header {
        padding: 20px 18px 14px;
      }

      .footer {
        padding: 0 18px 18px;
      }

      .hero-image {
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="top-row">
        <div>
          <h1 id="titleText">오늘 당신을 위한 성경말씀</h1>

        <div class="lang-switch" aria-label="Language switch">

        </div>
      </div>
      <div class="hero-image" aria-label="성경 관련 이미지"></div>
    </header>

    <section class="content">
      <div class="section-switch" id="sectionSwitch"></div>

      <div>
        <p class="label" id="selectLabel">오늘 내 마음은 어떤가요?</p>
        <div class="option-grid" id="optionGrid"></div>
      </div>

      <div class="actions">
        <button class="primary-btn" id="recommendBtn" disabled>말씀 추천받기</button>
        <button class="ghost-btn" id="anotherBtn" disabled>다른 구절 보기</button>
      </div>

      <section class="result" id="resultBox">

      </section>
    </section>

    <footer class="footer" id="footerText">

  </main>

    function ensureMinimumVerses(library, minCount) {
      Object.keys(library).forEach((sectionKey) => {
        const options = library[sectionKey];
        const pool = supplementalVersePool[sectionKey] || [];
        options.forEach((option) => {
          const existingRefs = new Set(option.verses.map((verse) => verse.reference));
          let poolIndex = option.id.length % (pool.length || 1);
          while (option.verses.length < minCount && pool.length > 0) {
            const candidate = pool[poolIndex % pool.length];
            poolIndex += 1;
            if (existingRefs.has(candidate.reference)) {
              continue;
            }
            option.verses.push({ ...candidate });
            existingRefs.add(candidate.reference);
          }
        });
      });
    }

    function getReferenceByLanguage(reference) {
      if (lang === "ko") {
        return reference;
      }
      const match = reference.match(/^([^\d]+)\s*(.+)$/);
      if (!match) {
        return reference;
      }
      const koBook = match[1].trim();
      const chapterVerse = match[2].trim();
      const enBook = bookNameMapKoToEn[koBook];
      if (!enBook) {
        return reference;
      }
      return `${enBook} ${chapterVerse}`;
    }

    function pickVerse(option) {
      if (!option || !option.verses || option.verses.length === 0) {
        return null;
      }
      let idx = Math.floor(Math.random() * option.verses.length);
      if (option.verses.length > 1) {
        while (idx === lastIndex) {
          idx = Math.floor(Math.random() * option.verses.length);
        }
      }
      lastIndex = idx;
      return option.verses[idx];
    }

      resultBox.classList.remove("loading");
    }

    function renderResultCard(option, picked) {
      const optionName = lang === "ko" ? option.ko : option.en;
      const chipLabel = selectedSection === "mood" ? t("chipMood") : t("chipSituation");
      const verseText = lang === "ko" ? picked.verseKo : picked.verseEn;
      const descText = lang === "ko" ? picked.descKo : picked.descEn;
      const referenceText = getReferenceByLanguage(picked.reference);
      const altText = lang === "ko"
        ? `${optionName}에 어울리는 성경 묵상 이미지`
        : `Bible meditation image for ${optionName}`;

      resultBox.classList.remove("loading");
      resultBox.innerHTML = `
        <img class="verse-visual fade-in" src="${option.image}" alt="${altText}" loading="lazy" />
        <span class="chip fade-in">${chipLabel}: ${optionName}</span>
        <blockquote class="fade-in">${verseText}</blockquote>
        <div class="ref fade-in">${referenceText} (${t("version")})</div>
        <p class="desc fade-in">${descText}</p>
      `;
    }

    function renderVerse() {
      const option = findSelectedOption();
      if (!option) {
        return;
      }

      const picked = pickVerse(option);
      if (!picked) {
        resultBox.innerHTML = `<p class="empty">${t("notReady")}</p>`;
        return;
      }

      clearLoading();
      recommendBtn.disabled = true;
      anotherBtn.disabled = true;
      resultBox.classList.add("loading");
      resultBox.innerHTML = `
        <div class="loading-wrap">
          <div class="spinner" aria-hidden="true"></div>
          <p class="loading-text">${t("loading")}</p>
        </div>
      `;

      const delay = 1200 + Math.floor(Math.random() * 900);
      loadingTimer = setTimeout(() => {
        lastPicked = { optionId: option.id, verse: picked };
        renderResultCard(option, picked);

        recommendBtn.disabled = false;
        anotherBtn.disabled = false;
        loadingTimer = null;
      }, delay);
    }

    langKoBtn.addEventListener("click", () => {
      if (lang === "ko") {
        return;
      }
      lang = "ko";
      renderHeaderTexts();
      renderSectionSwitch();
      renderOptionButtons();
      const option = findSelectedOption();
      if (option && lastPicked && lastPicked.optionId === option.id) {
        renderResultCard(option, lastPicked.verse);
      } else if (!selectedOptionId) {
        showEmpty();
      } else {
        showReady();
      }
    });

    langEnBtn.addEventListener("click", () => {
      if (lang === "en") {
        return;
      }
      lang = "en";
      renderHeaderTexts();
      renderSectionSwitch();
      renderOptionButtons();
      const option = findSelectedOption();
      if (option && lastPicked && lastPicked.optionId === option.id) {
        renderResultCard(option, lastPicked.verse);
      } else if (!selectedOptionId) {
        showEmpty();
      } else {
        showReady();
      }
    });

    recommendBtn.addEventListener("click", renderVerse);
    anotherBtn.addEventListener("click", renderVerse);

    renderHeaderTexts();
    renderSectionSwitch();
    renderOptionButtons();
    showEmpty();
  </script>
</body>
</html>
